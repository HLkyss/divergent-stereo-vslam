%YAML 1.0
---

#--------------------------------------------------------------------------------------------
# Camera Parameters. Adjust them!
#--------------------------------------------------------------------------------------------

Camera.topic_left: /cam0/image_raw
Camera.topic_right: /cam1/image_raw

Camera.model_left: pinhole
Camera.model_right: pinhole

Camera.left_nwidth: 1280
Camera.left_nheight: 960

Camera.right_nwidth: 1280
Camera.right_nheight: 960

# Camera calibration and distortion parameters (OpenCV) 
Camera.fxl: 918.7557727268096
Camera.fyl: 917.100322113574
Camera.cxl: 663.9715086766138
Camera.cyl: 458.2317378287026

Camera.k1l: 0.03214056872114345
Camera.k2l: -0.05133112026546477
Camera.p1l: -0.001980884923396905
Camera.p2l: -0.002980254931736034

Camera.fxr: 918.4406295165176
Camera.fyr: 916.2289395574527
Camera.cxr: 664.090071832108
Camera.cyr: 481.4854933038848

Camera.k1r: 0.0423059221217819
Camera.k2r: -0.06445963777166283
Camera.p1r: -0.0014931296253893548
Camera.p2r: 0.0014869556511090047


# Camera Extrinsic parameters T_b_ci ( v_b = T_b_ci * v_ci )
body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   #theta15
#   data: [0.965926, 0., -0.258819, 0.,
#          0., 1., 0., 0.,
#          0.258819, 0., 0.965926, 0.,
#          0., 0., 0., 1.]
#   data: [0.961399, 0.,   -0.275159,    -0.17981,
#          -0.00148487,    0.999987, -0.00484807, 0.000386465,
#          0.275156,   0.0050695,    0.961386,   0.0449863,
#          0., 0., 0., 1. ]
   data: [ 0.961406, 0., -0.275134, -0.17981,
           0., 1., 0., 0.000386465,
           0.275134, 0., 0.961406, 0.0449863,
           0., 0., 0., 1. ]

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
  #theta15
#   data: [ 0.965926, 0., 0.258819, 0.35,
#           0., 1., 0., 0.,
#           -0.258819, 0., 0.965926, 0.,
#           0., 0., 0., 1. ]

#   data: [0.965926, 0., 0.258819, 0.167952,
#          0., 1., 0., -0.000386465,
#          -0.258819, 0., 0.965926, 0.0450199,
#          0., 0., 0., 1. ]
   data: [ 0.961406, 0., 0.275134, 0.167952,
           0., 1., 0., -0.000386465,
           -0.275134, 0., 0.961406, 0.0450199,
           0., 0., 0., 1. ]


#--------------------------------------------------------------------------------------------
# SLAM Parameters. Adjust them!
#--------------------------------------------------------------------------------------------
debug: 0
log_timings: 0

cuda: 1

mono: 0
stereo: 0
mono_stereo: 1
fov: 70
#theta: 10
theta: 15

force_realtime: 1 #1

# Estimator Mode
slam_mode: 1

# Loop Closing mode
buse_loop_closer: 0 # 暂时不开

# Stereo rectify or not
bdo_stereo_rect: 0
alpha: 0.

# Undist Image or not
bdo_undist: 0

# Init / KF px th.
finit_parallax: 20.

# Features Extractor
use_shi_tomasi: 0
use_fast: 0
use_brief: 1
use_singlescale_detector: 1

# Min dist between kps (define the number of kps)
nmaxdist: 30  #35 todo 越小，点越多 20

# Features quality th.
nfast_th: 20 # 10
dmaxquality: 0.01 # used for gftt or singlescale 0.001

# Pre-processing
use_clahe: 1
fclahe_val: 3

# KLT related settings.
do_klt: 1
klt_use_prior: 1 # 1
btrack_keyframetoframe: 0
nklt_win_size: 9 # 9
nklt_pyr_lvl: 3 # 3

# Opencv Default: 30 iters. + 0.01 prec.
nmax_iter: 30
fmax_px_precision: 0.01

fmax_fbklt_dist: 0.5 #0.5 降低阈值，更严格地过滤前后光流不一致的点
nklt_err: 30. #30. 跟踪误差阈值

# Matching th.
bdo_track_localmap: 1

fmax_desc_dist: 0.35 #0.35 # Ratio from desc size (for binary desc.)
fmax_proj_pxdist: 2.

# Randomize RANSAC?
doepipolar: 1
dop3p : 0 # 0
bdo_random: 1
nransac_iter: 500 # 100
fransac_err: 2. # 3.

# Reproj err th.
fmax_reproj_err: 3.
buse_inv_depth: 1

# Ceres related parameters
robust_mono_th: 5.9915 # (20% : 3.2189 / 10% :  4.6052 / 5% : 5.9915 / 2%: 7.8240 / 1%: 9.2103)  

use_sparse_schur: 1
use_dogleg: 0
use_subspace_dogleg: 0
use_nonmonotic_step: 0

# Estimator parameters
apply_l2_after_robust: 1 # 1

nmin_covscore: 25 # Min co-obs for optimizing in SLAM mode BA

# Map Filtering
fkf_filtering_ratio: 0.95

# Final Pass
do_full_ba: 0